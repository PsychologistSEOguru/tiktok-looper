<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TikTok Mirror Looper</title>
    <script src="coi-serviceworker.js"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { border: 2px dashed #fe2c55; padding: 40px; width: 300px; margin: 0 auto; border-radius: 20px; cursor: pointer; }
        #status { margin: 20px; color: #00ffcc; font-weight: bold; }
        #downloadBtn { display: none; background: #fe2c55; color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>TikTok Looper</h1>
    <div class="box" id="box" onclick="document.getElementById('fileInput').click()">
        Click to Upload Video
        <input type="file" id="fileInput" hidden accept="video/*">
    </div>
    <div id="status">INITIALIZING...</div>
    <button id="downloadBtn">DOWNLOAD LOOPED VIDEO</button>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true, 
            corePath: 'https://cdn.jsdelivr.net' 
        });

        async function init() {
            try {
                await ffmpeg.load();
                document.getElementById('status').innerText = "READY: UPLOAD VIDEO";
            } catch (e) {
                document.getElementById('status').innerText = "SECURITY ERROR: REFRESH PAGE";
            }
        }

        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('status').innerText = "PROCESSING... PLEASE WAIT";
            
            if (!ffmpeg.isLoaded()) await ffmpeg.load();

            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));
            
            // This runs the actual video editing command
            await ffmpeg.run('-i', 'input.mp4', '-filter_complex', '[0:v]reverse[r];[0:v][r]concat=n=2:v=1[v]', '-map', '[v]', 'output.mp4');

            const data = ffmpeg.FS('readFile', 'output.mp4');
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            
            document.getElementById('status').innerText = "SUCCESS!";
            const btn = document.getElementById('downloadBtn');
            btn.style.display = 'inline-block';
            btn.onclick = () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = 'looped.mp4';
                a.click();
            };
        };

        init();
    </script>
</body>
</html>
